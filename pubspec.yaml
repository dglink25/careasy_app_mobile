name: careasy_app_mobile
description: CarEasy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  flutter_secure_storage: ^9.0.0
  webview_flutter: ^4.4.2
  http: ^1.1.0
  google_sign_in: ^6.2.1
  firebase_core: ^4.5.0
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # ⚠️ UN SEUL package pour les icônes
  flutter_launcher_icons: "^0.14.4"  # Version à jour

# ⚠️ SUPPRIMEZ complètement cette section
# flutter_icons:
#   android: true
#   ios: true
#   image_path: "assets/images/logo.png"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_round: "assets/images/logo.png"  # Important pour les icônes rondes
  adaptive_icon_monochrome: "assets/images/logo.png"  # Optionnel
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  android_icon_round: "assets/images/logo.png"  # Forcer la génération de l'icône ronde
  android_adaptive_icon_foreground: "assets/images/logo.png"
  android_adaptive_icon_background: "#FFFFFF"
  android_adaptive_icon_monochrome: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/