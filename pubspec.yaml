name: careasy_app_mobile
description: CarEasy Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Core ──────────────────────────────────────
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  http_parser: ^4.0.2
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.5

  # ── Firebase ──────────────────────────────────
  firebase_core: ^4.5.0

  # ── UI ────────────────────────────────────────
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  badges: ^3.1.2

  # ── Messagerie temps réel ─────────────────────
  pusher_channels_flutter: ^2.4.0

  # ── Notifications ─────────────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  
  # URL Launcher
  url_launcher: ^6.3.1

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # Utils
  connectivity_plus: ^6.1.3
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  
  # Audio - UNIQUEMENT just_audio et record (PAS audioplayers)
  record: ^5.1.1
  just_audio: ^0.9.39
  
  # Video
  video_player: ^2.9.2
  
  # Google Sign In
  google_sign_in: ^6.2.2

  animations: ^2.0.11

  audioplayers: ^5.2.1
  chewie: ^1.8.5

  path_provider: ^2.1.5

  # ── Carte OpenStreetMap (PRIORITAIRE - GRATUIT) ──
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_location_marker: ^8.1.0
  firebase_messaging: ^16.1.2 
  map_launcher: ^3.2.0
  package_info_plus: ^9.0.0
  app_links: ^6.0.0
  flutter_inappwebview: ^6.1.5



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/

dependency_overrides:
  record_linux: 1.3.0
  record_platform_interface: 1.5.0