name: careasy_app_mobile
description: CarEasy Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Core ──────────────────────────────────────
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  http_parser: ^4.0.2
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.5

  # ── Firebase ──────────────────────────────────
  firebase_core: ^3.12.1

  # ── UI ────────────────────────────────────────
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  badges: ^3.1.2

  # ── Messagerie temps réel ─────────────────────
  pusher_channels_flutter: ^2.4.0

  # ── Notifications ─────────────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # ── Permissions ───────────────────────────────
  permission_handler: ^11.3.1

  # ── URL Launcher ──────────────────────────────
  url_launcher: ^6.3.1

  # ── Media ─────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # ── Audio / Video ─────────────────────────────
  audioplayers: ^5.2.1
  video_player: ^2.9.3
  chewie: ^1.8.5

  # ── Utils ─────────────────────────────────────
  connectivity_plus: ^6.1.3
  path_provider: ^2.1.5

  # ── Google ────────────────────────────────────
  google_sign_in: ^6.2.2

  # ── Localisation GPS ──────────────────────────
  geolocator: ^11.0.0

  # ── Carte OpenStreetMap (PRIORITAIRE - GRATUIT) ──
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_location_marker: ^8.1.0

  # ── Google Maps (MIS EN COMMENTAIRE - PEUT DEVENIR PAYANT) ──
  # google_maps_flutter: ^2.9.0
  # geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/